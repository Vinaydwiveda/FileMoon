<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Corrected Font Awesome CDN Link -->
    <link rel="stylesheet" href="https://cloudflare.com" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <script src="https://cdn.tailwindcss.com"></script>
    <title>FileMoon</title>
</head>
<body>
    <div class="bg-gray-500 min-h-screen flex justify-center items-center">
        <div class="bg-white w-6/12 p-8 rounded-lg shadow-md"> 

            <div class="flex justify-center items-center gap-3">
                
                <i class="fa-solid fa-moon text-3xl text-gray-700"></i>
                <h1 class="text-3xl font-semibold text-gray-800">FileMoon</h1>

            </div>

            <form class="flex flex-col space-y-2 mt-5">


                <label>Name</label>
                <input type="text" name="Name" value="" placeholder="Enter your name" class="w-full border border-gray-200 p-2 rounded-lg mt-2">
             
                <label>Email</label>
                <input type="email" name="Email" value="" placeholder="email@gamil.com" class="w-full border border-gray-200 p-2 rounded-lg mt-2">

                <label>Mobile</label>
                <input type="number" name="Mob.No" value="" placeholder="90658***2" class="w-full border border-gray-200 p-2 rounded-lg mt-2">


                <label>Password</label>
                <input type="password" name="Password" value="" placeholder="*********" class="w-full border border-gray-200 p-2 rounded-lg mt-2">

                <button type="submit" class="w-full border border-gray-200 p-2 rounded-lg mt-2 text-purple-500">Sign Up</button>

                <p class="text-center">
                    Allready account? <a href="#" class="text-purple-500">Sign In</a>
                </p>


            </form>

        </div>
    </div>
</body>
</html>
