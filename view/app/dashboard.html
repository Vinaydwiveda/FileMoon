<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Corrected Font Awesome CDN Link -->
    <link
  href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css"
  rel="stylesheet"
/>
 
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.30.1/moment.min.js"></script>
    <title>FileMoon</title>
</head>
<body>
    <div class="bg-gray-100 h-screen ">

        <aside class="pt-6 space-y-6 fixed top-0 left-0  h-full transition-all duration-300 overflow-hidden bg-gradient-to-r from-cyan-500 to-blue-500" id="sidebar" style="width: 300px;">
        <div class="flex flex-col items-center overflow-hidden">
            <img src="../app/img/download.jpeg" alt="Avtar" class="w-20 h-20 rounded-full mx-auto mt-5">
            <h1 class="text-lg font-medium text-white" id="user">Vinay Dwivedi</h1>
            <p class="text-sm text-gray-100 "id=userEmail>lyeboy312@gamil.com</p>
        </div>

        <div class="px-6 flex flex-col gap-4 ">
            <a href="/dashboard" >
                <button class="w-full py-2.5 bg-rose-400 text-white  rounded hover:bg-rose-600">
                    <i class="ri-apps-line"></i>
                    <label>Dashboard</label>
                  </button>
            </a>

            <a href="/files" >
                <button class="w-full py-2.5 bg-rose-400 text-white  rounded hover:bg-rose-600"on>
                    <i class="ri-file-line"></i>
                    <label>My Files</label>
                </button>
            </a>

            <a href="/history" >
                <button class="w-full py-2.5 bg-rose-400 text-white  rounded hover:bg-rose-600">
                    <i class="ri-history-line"></i>
                    <label>History</label>
                </button>
            </a>

            
                <button class="w-full py-2.5 bg-rose-400 text-white  rounded hover:bg-rose-600" onclick="logout()">
                    <i class="ri-logout-circle-r-line"></i>
                    <label>Logout</label>
                </button>
            
        </div>
</aside>


<section class=" transition-all duration-300" id="section" style="margin-left: 300px;">
    <nav class="bg-white p-5 flex gap-2 border-b border-gray-100 justify-between">
        <div class="flex gap-2 items-center">
            <i class="ri-contrast-2-fill text-3xl text-violet-700"></i>
            <h1 class="font-semibold text-3xl">Filemoon</h1>
        </div>
       <div clas="space-x-3 p-2">
        <button class="bg-gray-200 hover:bg-gray-300 p-2 rounded-md" onclick="logout()">
            <i class="ri-logout-circle-r-line"></i>
        </button>
         <button onclick="toggleSidebar()" class="bg-gray-200 hover:bg-gray-300 p-2 rounded-md">
            <i class="ri-menu-line"></i>
        </button>
       </div>
    </nav>
    <div class="p-6">
        <h1 class="text-lg font-medium ">Dashboard</h1>
    <div class="mt-6 grid grid-cols-4 gap-6">

     <div class=" relative bg-white rounded-lg shadow-lg h-40  flex flex-col items-center justify-center overflow-hidden">

        <h1 class="text-xl font-semibold">Videos</h1>
        <p class="text-4xl font-bold">25609</p>
        <div 
         class="h-[100px] w-[100px] rounded-full absolute bottom-[-50px] left-[-50px]" 
        style="background: linear-gradient(to right, #b8cbb8 0%, #b8cbb8 0%, #b465da 0%, #cf6cc9 33%, #ee609c 66%, #ee609c 100%);"
        >
        <i class="ri-video-line text-white text-4xl flex flex-row-reverse p-2"></i>
     </div>

    </div>
     
     <div class="relative bg-white rounded-lg shadow-lg h-40  flex flex-col items-center justify-center overflow-hidden">

        <h1 class="text-xl font-semibold">Audios</h1>
        <p class="text-4xl font-bold">15662</p>
        <div 
         class="h-[100px] w-[100px] rounded-full absolute bottom-[-50px] left-[-50px]" 
        style="background-image: linear-gradient(to right, #4facfe 0%, #00f2fe 100%);"
        >
        <i class="ri-folder-music-line text-white text-4xl flex flex-row-reverse p-2"></i>
     </div>

     </div>

     <div class="relative bg-white rounded-lg shadow-lg h-40  flex flex-col items-center justify-center overflow-hidden">

        <h1 class="text-xl font-semibold">PDF</h1>
        <p class="text-4xl font-bold">25609</p>
        <div 
         class="h-[100px] w-[100px] rounded-full absolute bottom-[-50px] left-[-50px] p-2" 
        style="background-image: linear-gradient(to top, #30cfd0 0%, #330867 100%);"
        >
        <i class="ri-file-pdf-2-line text-white text-4xl flex flex-row-reverse"></i>
     </div>

     </div>
     <div class="relative bg-white rounded-lg shadow-lg h-40  flex flex-col items-center justify-center overflow-hidden">

        <h1 class="text-xl font-semibold">Images</h1>
        <p class="text-4xl font-bold">750</p>
        <div 
         class="h-[100px] w-[100px] rounded-full absolute bottom-[-50px] left-[-50px]" 
        style="background-image: linear-gradient(180deg, #2af598 0%, #009efd 100%);"
        >
        <i class="ri-file-image-line text-white text-4xl flex flex-row-reverse p-2"></i>
     </div>
     </div>

    <div class="col-span-2 relative bg-white rounded-lg shadow-lg  p-6  overflow-hidden">

        <h1 class="text-xl font-semibold">Recents Files Uploads</h1>

        <div class="flex flex-col w-[100%] gap-5 p-3" id="RecentUpload">
           
           
        </div>
       

    </div>

     <div class="col-span-2 relative bg-white rounded-lg shadow-lg  p-6  overflow-hidden">

        <h1 class="text-xl font-semibold flex justify-between"><span>Recent Shared</span> <span>Shared To</span></h1>


        <div class="flex flex-col w-[100%] gap-5 p-3" id="RecentSharedBox">
           
     
        </div>
       

    </div>


     </div>


    </div>
    </div>
    
    
</section>
        
        

    </div>

</body>
<script src="../js/common.js" ></script>
<script src="../js/baseApi.js" ></script>
<script src="../js/dashboard.js"></script>

</script>
</html>
