<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Corrected Font Awesome CDN Link -->
    <link
  href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css"
  rel="stylesheet"
/>
 
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <title>FileMoon</title>
</head>
<body>
    <div class="overflow x-auto ">

        <aside class="pt-6 space-y-6 fixed top-0 left-0  h-full transition-all duration-300 overflow-hidden bg-gradient-to-r from-cyan-500 to-blue-500" id="sidebar" style="width: 300px;">
         <div class="flex flex-col items-center overflow-hidden">
            <img src="../app/img/download.jpeg" alt="Avtar" class="w-20 h-20 rounded-full mx-auto mt-5">
            <h1 class="text-lg font-medium text-white" id="user">Vinay Dwivedi</h1>
            <p class="text-sm text-gray-100 "id=userEmail>lyeboy312@gamil.com</p>
        </div>

        <div class="px-6 flex flex-col gap-4 ">
            <a href="/dashboard" >
                <button class="w-full py-2.5 bg-rose-400 text-white  rounded hover:bg-rose-600">
                    <i class="ri-apps-line"></i>
                    <label>Dashboard</label>
                  </button>
            </a>

            <a href="/files" >
                <button class="w-full py-2.5 bg-rose-400 text-white  rounded hover:bg-rose-600"on>
                    <i class="ri-file-line"></i>
                    <label>My Files</label>
                </button>
            </a>

            <a href="/history" >
                <button class="w-full py-2.5 bg-rose-400 text-white  rounded hover:bg-rose-600">
                    <i class="ri-history-line"></i>
                    <label>History</label>
                </button>
            </a>

            
                <button class="w-full py-2.5 bg-rose-400 text-white  rounded hover:bg-rose-600" onclick="logout()">
                    <i class="ri-logout-circle-r-line"></i>
                    <label>Logout</label>
                </button>
            
        </div>
</aside>


<section class=" transition-all duration-300" id="section" style="margin-left: 300px;">
    <nav class="bg-white p-5 flex gap-2 border-b border-gray-100 justify-between">
        <div class="flex gap-2 items-center">
            <i class="ri-contrast-2-fill text-3xl text-violet-700"></i>
            <h1 class="font-semibold text-3xl">Filemoon</h1>
        </div>
       <div clas="space-x-3 p-2">
        <button class="bg-gray-200 hover:bg-gray-300 p-2 rounded-md" onclick="logout()">
            <i class="ri-logout-circle-r-line"></i>
        </button>
         <button onclick="toggleSidebar()" class="bg-gray-200 hover:bg-gray-300 p-2 rounded-md">
            <i class="ri-menu-line"></i>
        </button>
       </div>
    </nav>
    <div class="p-6 space-y-4">
        <div class="flex justify-between items-center"> 
            <h1 class="text-lg font-medium ">My-Files</h1>
            <button  class="bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600" onclick="toggleUploadForm()">
                <i class="ri-upload-line"></i>
                Upload
            </button>
        </div>
          <table class="w-full border-collapse">
    <thead>
        <tr class="bg-slate-900 text-white">
            <th class="py-4 px-6 text-left font-medium">File Name</th>
            <th class="py-4 px-4 text-center font-medium">Size</th>
            <th class="py-4 px-4 text-center font-medium">Type</th>
            <th class="py-4 px-4 text-center font-medium">Created</th>
            <th class="py-4 px-4 text-center font-medium">Actions</th>
        </tr>
    </thead>

           <tbody id="fileTable">
        
    </tbody>



        </table>
   


    </div>
    </div>
    
    
</section>

<div class="fixed  bg-white shadow-lg h-full right-0 top-0 p-6" style="width: 400px; display: none;" id="drawer">

    <div class="flex justify-between items-center">
        <h1 class="font-medium text-lg text-gray-600  ">Upload a New File</h1>
        <button onClick="closeUploadForm()">
            <i class="ri-close-line  text-gray-500 hover:text-gray-800 cursor-pointer"></i>
        </button>
    </div>
    
    <form class="mt-6 space-y-4" onsubmit="uploadform(event)">
        <div class="flex flex-col space-y-2 mt-4">
            <label class="text-gray-600 font-medium">FileName</label>
            <input required type="text" class="w-full border border-gray-300 rounded-md p-2 mt-2" placeholder="Enter file name" name="Filename">
        </div>

        <div class="flex flex-col">
            <label class="text-gray-600 font-medium">Choose file</label>
            <input required type="file" class="w-full border border-gray-300 rounded-md p-2 mt-2" placeholder="Enter file name" name="file">
        </div>

        <button>
            <button id="btn" type="submit" class="bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600" >
                <i class="ri-upload-line"></i>
                Upload
            </button>
        </button>

    </form>

    <div class="bg-gray-400 h-4 mt-4 rounded ">
        <div class="bg-blue-500 h-full text-center" style="width: 0%;" id="progressBar"></div>
           
        </div>
    </div>

</div>
        
        

    </div>

</body>
<script src="../js/common.js" ></script>
<script src="../js/baseApi.js" ></script>
<script src="../js/files.js" >
</script>
</html>
